<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qualifyr AI - Copilote IA pour PME et artisans</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="simple-ux">
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navigation principale">
        <div class="brand">
          <div class="brand-mark">
            <img src="./favicon.svg" alt="Qualifyr" />
          </div>
          <div>
            <strong>Qualifyr AI</strong>
            <span>Copilote PME</span>
          </div>
          <button class="sidebar-collapse" id="sidebarCollapse" aria-label="Reduire le menu" aria-expanded="true">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
        </div>

        <nav class="nav-list" id="navList"></nav>

        <div class="sidebar-card">
          <span class="eyebrow">Votre assistant</span>
          <strong>Qualifyr travaille pour vous</strong>
          <p>Il trie, relance et organise les actions importantes.</p>
          <button class="dark-ghost" data-view="ai-center">Ouvrir l'assistant</button>
        </div>
      </aside>

      <div class="mobile-nav-backdrop" data-mobile-menu-close></div>
      <section class="mobile-nav-popover" id="mobileNavPopover" aria-label="Menu Qualifyr AI"></section>

      <main class="main">
        <header class="topbar">
          <button class="icon-button mobile-menu" id="menuToggle" aria-label="Ouvrir le menu" aria-expanded="false">
            <svg class="mobile-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
            <strong>Menu</strong>
          </button>
          <div>
            <p class="eyebrow" id="viewSubtitle">Votre assistant pour gagner du temps</p>
            <h1 id="viewTitle">Tableau de bord</h1>
          </div>
          <div class="top-actions">
            <button class="icon-button" title="Notifications" aria-label="Notifications" data-view="notifications">
              <svg viewBox="0 0 24 24"><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"/><path d="M10 21h4"/></svg>
            </button>
            <button class="secondary-button account-button" id="accountButton" data-view="auth">Se connecter</button>
            <button class="primary-button" data-open-talk="Je veux savoir quel copilote installer">
              <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
              Demander a Qualifyr
            </button>
          </div>
        </header>

        <section class="view active" id="view-dashboard"></section>
        <section class="view" id="view-landing"></section>
        <section class="view" id="view-pricing"></section>
        <section class="view" id="view-commercial"></section>
        <section class="view" id="view-onboarding"></section>
        <section class="view" id="view-modules"></section>
        <section class="view" id="view-crm"></section>
        <section class="view" id="view-client-profile"></section>
        <section class="view" id="view-quotes"></section>
        <section class="view" id="view-calendar"></section>
        <section class="view" id="view-copilots"></section>
        <section class="view" id="view-ai-center"></section>
        <section class="view" id="view-automations"></section>
        <section class="view" id="view-integrations"></section>
        <section class="view" id="view-marketplace"></section>
        <section class="view" id="view-copilot-setup"></section>
        <section class="view" id="view-custom-ai"></section>
        <section class="view" id="view-notifications"></section>
        <section class="view" id="view-documents"></section>
        <section class="view" id="view-settings"></section>
        <section class="view" id="view-more"></section>
        <section class="view" id="view-auth"></section>
        <section class="view" id="view-admin"></section>
        <section class="view" id="view-billing"></section>
        <section class="view" id="view-help"></section>
      </main>
    </div>

    <nav class="bottom-nav" id="bottomNav" aria-label="Navigation mobile"></nav>

    <div class="universal-command universal-copilot-cta" aria-label="Trouver le bon copilote Qualifyr AI" data-view="marketplace">
      <span>✨</span>
      <div class="universal-command-copy">
        <strong>Trouvez votre IA métier</strong>
        <small>Choisir les aides utiles en 2 minutes</small>
      </div>
      <button class="primary-button universal-cta" type="button">Voir les IA</button>
    </div>

    <div class="action-modal" id="actionModal" aria-hidden="true">
      <div class="action-modal-backdrop" data-close-modal></div>
      <section class="action-modal-panel" role="dialog" aria-modal="true" aria-labelledby="actionModalTitle">
        <button class="icon-button action-modal-close" data-close-modal aria-label="Fermer la fenetre">
          <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div id="actionModalContent"></div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
